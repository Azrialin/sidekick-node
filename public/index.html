<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Sidekick Node Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, Segoe UI, Arial;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 720px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea, #f093fb);
        padding: 24px 28px;
        color: white;
      }

      .header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .header p {
        opacity: 0.85;
        font-size: 0.9rem;
        margin-top: 4px;
      }

      .chat-area {
        padding: 20px 28px;
        min-height: 300px;
        max-height: 480px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 80%;
      }

      .msg.user {
        align-self: flex-end;
        align-items: flex-end;
      }

      .msg.ai {
        align-self: flex-start;
        align-items: flex-start;
      }

      .bubble {
        padding: 10px 16px;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .msg.user .bubble {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .msg.ai .bubble {
        background: #f3f4f6;
        color: #1f2937;
        border-bottom-left-radius: 4px;
      }

      .label {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-bottom: 4px;
        padding: 0 4px;
      }

      .typing {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 16px;
        background: #f3f4f6;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        width: fit-content;
      }

      .typing span {
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-6px); background: #764ba2; }
      }

      .tool-tag {
        display: inline-block;
        margin-top: 6px;
        font-size: 0.72rem;
        background: linear-gradient(135deg, #f093fb22, #667eea22);
        border: 1px solid #667eea44;
        color: #764ba2;
        border-radius: 99px;
        padding: 2px 10px;
      }

      .input-area {
        padding: 16px 28px 24px;
        display: flex;
        gap: 10px;
        border-top: 1px solid #f3f4f6;
      }

      input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #667eea;
      }

      button {
        padding: 12px 22px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
      }

      button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .empty-state {
        text-align: center;
        color: #d1d5db;
        padding: 40px 0;
        font-size: 0.95rem;
      }

      .empty-state .icon {
        font-size: 2.5rem;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>✨ Sidekick Node</h1>
        <p>AI 助手，支援工具呼叫與對話記憶</p>
      </div>
      <div class="chat-area" id="out">
        <div class="empty-state">
          <div class="icon">💬</div>
          試試問：維基百科查愛因斯坦
        </div>
      </div>
      <div class="input-area">
        <input id="q" placeholder="輸入訊息..." />
        <button id="go">送出</button>
      </div>
    </div>

    <script>
      const out = document.getElementById("out");
      const q = document.getElementById("q");
      const go = document.getElementById("go");
      const history = [];
      let firstMessage = true;

      async function ask() {
        const message = q.value.trim();
        if (!message) return;
        q.value = "";
        go.disabled = true;

        if (firstMessage) {
          out.innerHTML = "";
          firstMessage = false;
        }

        out.insertAdjacentHTML(
          "beforeend",
          `<div class="msg user"><div class="label">你</div><div class="bubble">${message}</div></div>`,
        );
        out.scrollTop = out.scrollHeight;

        const typing = document.createElement("div");
        typing.className = "msg ai";
        typing.id = "typing";
        typing.innerHTML = `<div class="label">AI</div><div class="typing"><span></span><span></span><span></span></div>`;
        out.appendChild(typing);
        out.scrollTop = out.scrollHeight;

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history }),
        });
        const data = await res.json();
        document.getElementById("typing")?.remove();

        const toolHtml =
          data.usedTools && data.usedTools.length
            ? `<span class="tool-tag">🔧 ${data.usedTools.join(", ")}</span>`
            : "";

        out.insertAdjacentHTML(
          "beforeend",
          `<div class="msg ai"><div class="label">AI</div><div class="bubble">${data.answer}${toolHtml}</div></div>`,
        );
        out.scrollTop = out.scrollHeight;

        history.push({ role: "user", content: message });
        history.push({ role: "assistant", content: data.answer });

        go.disabled = false;
        q.focus();
      }

      go.onclick = ask;
      q.addEventListener("keyup", (e) => {
        if (e.key === "Enter" && !go.disabled) ask();
      });
    </script>
  </body>
</html>
