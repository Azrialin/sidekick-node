name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev

      - name: Build and Push Image
        run: |
          docker build -t asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sidekick-repo/sidekick-node:${{ github.sha }} .
          docker push asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sidekick-repo/sidekick-node:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sidekick-node \
            --image asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sidekick-repo/sidekick-node:${{ github.sha }} \
            --platform managed \
            --region asia-east1 \
            --allow-unauthenticated \
            --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest
